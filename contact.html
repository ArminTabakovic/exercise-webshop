<!DOCTYPE HTML>
<html>
<head>
    <title>Contact - MINOPTAR</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body>
     <section class="main style1">
        <div class="container">
            <header class="major"><h2>Contact Us</h2></header>
            <form method="post" action="#">
                <div class="row gtr-uniform">
                    <div class="col-6 col-12-xsmall"><input type="text" name="name" placeholder="Name" /></div>
                    <div class="col-6 col-12-xsmall"><input type="email" name="email" placeholder="Email" /></div>
                    <div class="col-12"><textarea name="message" placeholder="Enter your message" rows="6"></textarea></div>
                    <div class="col-12"><ul class="actions special"><li><input type="submit" value="Send (Mockup)" class="primary" /></li></ul></div>
                </div>
            </form>
        </div>
    </section>
</body>
</html>
